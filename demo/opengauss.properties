# =============================================
# 1. 数据库连接相关
# =============================================
db=postgres
driver=org.opengauss.Driver
conn=jdbc:opengauss://192.168.199.249:15432/tpcc_2
user=benchmarksql
password=BenchmarkSql@123

# ==============================================
# 2. 压测规模配置（针对 64核/256G 深度优化）
# ==============================================
# 提升至 100 仓库，减少锁竞争，数据量约 10GB
warehouses=2
# 利用 64 核优势，大幅提升加载速度
loadWorkers=2

# 并发终端数提升至 128（核心数的 2 倍），充分压榨 CPU
terminals=4

# 运行模式：
runTxnsPerTerminal=0
runMins=10

# 限制每分钟事务数（0 表示不限制，尽全力压测）
limitTxnsPerMin=0

# ================================================================
# 3. 事务权重 (保持 TPC-C 标准比例)
# ================================================================
newOrderWeight=45
paymentWeight=43
orderStatusWeight=4
deliveryWeight=4
stockLevelWeight=4

# ================================================================
# 4. 结果输出与监控
# ================================================================
resultDirectory=./results/opengauss/opengauss_%tY-%tm-%td_%tH%tM%tS
terminalWarehouseFixed=true

# 开启系统监控
# osCollectorScript=./misc/os_collector_linux.py
# osCollectorInterval=1